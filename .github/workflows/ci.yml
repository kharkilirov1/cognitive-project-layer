name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build binaries
        run: cargo build --bins

      - name: SQLite index smoke
        run: |
          cargo run --quiet --bin cpl -- --root . index-build
          cargo run --quiet --bin cpl -- --root . index-refresh
          cargo run --quiet --bin cpl -- --root . index-search "persistent vector" --limit 3
          cargo run --quiet --bin cpl -- --root . index-db --json

      - name: SQLite vector DB smoke
        run: |
          cargo run --quiet --bin cpl -- --root . embed-index --backend local-hash --dimensions 128
          cargo run --quiet --bin cpl -- --root . embed-refresh --backend local-hash --dimensions 128
          cargo run --quiet --bin cpl -- --root . embed-search "persistent vector" --limit 3

      - name: Python script syntax
        run: python -m py_compile scripts/eval_retrieval.py scripts/bench_cli.py scripts/bench_mcp.py scripts/bench_large_repo.py scripts/check_bench_thresholds.py

      - name: Retrieval eval
        run: python scripts/eval_retrieval.py --top-k 3

      - name: CLI benchmark smoke
        run: python scripts/bench_cli.py --iterations 1 --warmup 0

      - name: MCP benchmark smoke
        run: python scripts/bench_mcp.py --iterations 1 --warmup 0

      - name: Large synthetic benchmark smoke
        run: >
          python scripts/bench_large_repo.py
          --files 120
          --symbols-per-file 2
          --iterations 1
          --warmup 0
          --json-out .cpl/eval-results/large-bench-smoke.json

      - name: Benchmark regression gate
        run: python scripts/check_bench_thresholds.py --input .cpl/eval-results/large-bench-smoke.json
